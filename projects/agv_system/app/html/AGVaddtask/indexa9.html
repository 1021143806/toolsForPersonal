<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGV 跨环境任务下发系统</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='80' height='40' x='10' y='30' fill='%234a6cf7' rx='8'/%3E%3Ccircle cx='30' cy='70' r='12' fill='%23333'/%3E%3Ccircle cx='70' cy='70' r='12' fill='%23333'/%3E%3C/svg%3E">
    <style>
        /* 样式保持不变，与之前一致 */
        :root {
            --primary-color: #4a6cf7;
            --primary-dark: #3a5bd9;
            --secondary-color: #6c757d;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --warning-color: #ffc107;
            --info-color: #17a2b8;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #212529;
            --border-color: #dee2e6;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
            --radius: 12px;
        }
        .dark-mode {
            --primary-color: #5d7df9;
            --primary-dark: #4a6cf7;
            --secondary-color: #8a93a2;
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --border-color: #333333;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, var(--bg-color) 0%, #e9ecef 100%);
            color: var(--text-color);
            min-height: 100vh;
            transition: var(--transition);
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
        header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--primary-color), #6c5ce7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }
        .theme-toggle:hover {
            transform: rotate(15deg);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .help-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }
        .help-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 25px;
            margin-bottom: 25px;
            transition: var(--transition);
            height: fit-content;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
        .card-title {
            font-size: 20px;
            margin-bottom: 20px;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-title svg {
            width: 24px;
            height: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-color);
        }
        select, input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text-color);
            font-size: 16px;
            transition: var(--transition);
        }
        select:focus, input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.2);
        }
        select option:disabled {
            color: var(--secondary-color);
            background-color: var(--card-bg);
        }
        .btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn:disabled {
            background: var(--secondary-color);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-secondary { background: var(--secondary-color); }
        .btn-success { background: var(--success-color); }
        .btn-warning { background: var(--warning-color); color: #212529; }
        .btn-info { background: var(--info-color); }
        .error {
            color: var(--danger-color);
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
        .response-box {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            border: 1px solid var(--border-color);
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 14px;
            white-space: pre-wrap;
            display: none;
        }
        .debug-toggle {
            background: none;
            border: none;
            color: var(--primary-color);
            cursor: pointer;
            margin-top: 10px;
            font-size: 14px;
            text-decoration: underline;
        }
        .debug-info {
            display: none;
            background: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 14px;
            white-space: pre-wrap;
        }
        footer {
            grid-column: 1 / -1;
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: var(--secondary-color);
            font-size: 14px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--radius);
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .modal-content-large {
            max-width: 90%;
            width: 90%;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }
        .help-content h1, .help-content h2, .help-content h3 {
            color: var(--primary-color);
            margin-top: 1em;
            margin-bottom: 0.5em;
            font-weight: 600;
        }
        .help-content h1 {
            font-size: 1.8em;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.3em;
        }
        .help-content h2 { font-size: 1.5em; }
        .help-content h3 { font-size: 1.2em; }
        .help-content p {
            margin-bottom: 1em;
            line-height: 1.6;
            color: var(--text-color);
        }
        .help-content code {
            background-color: rgba(0, 0, 0, 0.05);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
            color: var(--danger-color);
        }
        .help-content pre {
            background-color: rgba(0, 0, 0, 0.05);
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 1em;
        }
        .help-content pre code {
            background-color: transparent;
            padding: 0;
            color: inherit;
        }
        .help-content ul, .help-content ol {
            margin-left: 1.5em;
            margin-bottom: 1em;
            color: var(--text-color);
        }
        .help-content li { margin-bottom: 0.5em; }
        .help-content blockquote {
            border-left: 4px solid var(--primary-color);
            padding-left: 1em;
            margin-left: 0;
            color: var(--secondary-color);
            font-style: italic;
        }
        .help-content a {
            color: var(--primary-color);
            text-decoration: underline;
        }
        .help-content a:hover { color: var(--primary-dark); }
        .help-content table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 1em;
            border: 1px solid var(--border-color);
        }
        .help-content th, .help-content td {
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            text-align: left;
        }
        .help-content th {
            background-color: rgba(0, 0, 0, 0.05);
            font-weight: 600;
            color: var(--primary-color);
        }
        .help-content tr:nth-child(even) { background-color: rgba(0, 0, 0, 0.02); }
        .help-content strong, .help-content b { font-weight: 700; color: var(--text-color); }
        .help-content em, .help-content i { font-style: italic; }
        .help-content hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 1.5em 0;
        }
        .help-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 1em 0;
        }
        .modal h2 {
            margin-bottom: 15px;
            color: var(--primary-color);
        }
        .modal p {
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .shelf-lock {
            color: var(--warning-color);
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
        .query-toggle {
            display: flex;
            margin-bottom: 15px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .toggle-option {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: var(--card-bg);
            cursor: pointer;
            transition: var(--transition);
        }
        .toggle-option.active {
            background: var(--primary-color);
            color: white;
        }
        .task-details {
            margin-top: 20px;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }
        .task-item {
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 10px;
            background: rgba(0, 0, 0, 0.03);
        }
        .task-item:first-child {
            border-left: 4px solid var(--primary-color);
        }
        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .task-status {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-8 { background-color: var(--success-color); color: white; }
        .status-6 { background-color: var(--warning-color); color: #212529; }
        .status-4 { background-color: var(--info-color); color: white; }
        .status-9 { background-color: var(--primary-color); color: white; }
        .task-info {
            font-size: 14px;
            margin-bottom: 5px;
        }
        .task-info span {
            font-weight: 500;
        }
        .priority-btn {
            margin-top: 10px;
            padding: 6px 12px;
            font-size: 14px;
        }
        .empty-state {
            text-align: center;
            padding: 30px;
            color: var(--secondary-color);
        }
        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
        .option-with-comment {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .option-value { font-weight: 500; }
        .option-comment {
            font-size: 12px;
            color: var(--secondary-color);
            margin-left: 10px;
        }
        /* 全局错误提示 */
        #global-error {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: var(--danger-color);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            z-index: 2000;
            display: none;
            max-width: 80%;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="page-title">AGV 跨环境任务下发系统</h1>
            <div style="display: flex; align-items: center; gap: 10px;">
                <div class="help-toggle" id="help-toggle" title="查看帮助文档">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M12 16V12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M12 8H12.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="theme-toggle" id="theme-toggle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 16C14.2091 16 16 14.2091 16 12C16 9.79086 14.2091 8 12 8C9.79086 8 8 9.79086 8 12C8 14.2091 9.79086 16 12 16Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M12 2V4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M12 20V22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M4.93 4.93L6.34 6.34" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M17.66 17.66L19.07 19.07" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 12H4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M20 12H22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M6.34 17.66L4.93 19.07" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M19.07 4.93L17.66 6.34" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </div>
        </header>

        <!-- 左侧：任务下发 -->
        <div class="card">
            <h2 class="card-title">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 15C13.6569 15 15 13.6569 15 12C15 10.3431 13.6569 9 12 9C10.3431 9 9 10.3431 9 12C9 13.6569 10.3431 15 12 15Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M19.4 15C19.2669 15.3031 19.1337 15.6062 19.0006 15.9094C18.5458 16.8724 18.0909 17.8354 17.6361 18.7984C17.2218 19.6764 16.8075 20.5544 16.3932 21.4324C16.2019 21.8345 16.0106 22.2366 15.8193 22.6387C15.5155 23.2848 14.7761 23.6579 14.0769 23.516C13.7182 23.441 13.3898 23.2628 13.1378 23.0049C12.8857 22.747 12.7215 22.4214 12.6667 22.0714V22.0714C12.6118 21.7214 12.6689 21.3639 12.8295 21.0493C12.9901 20.7348 13.2454 20.4795 13.5599 20.3189C13.8745 20.1583 14.2319 20.1012 14.5819 20.1561L14.6667 20.1667C15.3333 20.2778 16 20.3889 16.6667 20.5C16.8889 20.537 17.1111 20.5741 17.3333 20.6111C17.6667 20.6667 18 20.7222 18.3333 20.7778C18.6667 20.8333 19 20.8889 19.3333 20.9444C19.6667 21 20 21.0556 20.3333 21.1111C20.6667 21.1667 21 21.2222 21.3333 21.2778" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M4.60078 15C4.73387 15.3031 4.867 15.6062 5.00013 15.9094C5.45497 16.8724 5.90981 17.8354 6.36465 18.7984C6.77898 19.6764 7.19331 20.5544 7.60764 21.4324C7.79891 21.8345 7.99018 22.2366 8.18145 22.6387C8.48528 23.2848 9.22465 23.6579 9.92389 23.516C10.2826 23.441 10.611 23.2628 10.863 23.0049C11.1151 22.747 11.2793 22.4214 11.3341 22.0714V22.0714C11.389 21.7214 11.3319 21.3639 11.1713 21.0493C11.0107 20.7348 10.7554 20.4795 10.4409 20.3189C10.1263 20.1583 9.7689 20.1012 9.41892 20.1561L9.33412 20.1667C8.66745 20.2778 8.00078 20.3889 7.33412 20.5C7.11189 20.537 6.88967 20.5741 6.66745 20.6111C6.33412 20.6667 6.00078 20.7222 5.66745 20.7778C5.33412 20.8333 5.00078 20.8889 4.66745 20.9444C4.33412 21 4.00078 21.0556 3.66745 21.1111C3.33412 21.1667 3.00078 21.2222 2.66745 21.2778" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M3 9C3.79565 9 4.55871 8.68393 5.12132 8.12132C5.68393 7.55871 6 6.79565 6 6C6 5.20435 5.68393 4.44129 5.12132 3.87868C4.55871 3.31607 3.79565 3 3 3C2.20435 3 1.44129 3.31607 0.87868 3.87868C0.31607 4.44129 0 5.20435 0 6C0 6.79565 0.31607 7.55871 0.87868 8.12132C1.44129 8.68393 2.20435 9 3 9V9Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M21 9C21.7956 9 22.5587 8.68393 23.1213 8.12132C23.6839 7.55871 24 6.79565 24 6C24 5.20435 23.6839 4.44129 23.1213 3.87868C22.5587 3.31607 21.7956 3 21 3C20.2044 3 19.4413 3.31607 18.8787 3.87868C18.3161 4.44129 18 5.20435 18 6C18 6.79565 18.3161 7.55871 18.8787 8.12132C19.4413 8.68393 20.2044 9 21 9V9Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M9 3H15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M9 21H15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                任务下发
            </h2>
            <div class="form-group">
                <label for="area-select">选择区域</label>
                <select id="area-select">
                    <option value="">请选择区域</option>
                </select>
            </div>

            <div class="form-group">
                <label for="task-select">任务模板</label>
                <select id="task-select">
                    <option value="">请先选择区域</option>
                </select>
            </div>

            <div class="form-group" id="shelf-group">
                <label for="shelf-input">货架号</label>
                <input type="text" id="shelf-input" placeholder="请输入货架号">
                <div class="error" id="shelf-error">请输入货架号</div>
                <div class="shelf-lock" id="shelf-lock">此货架在5分钟内已下发过任务，请勿重复下发</div>
            </div>

            <div class="form-group" id="task-path-group">
                <label for="task-path-select">任务路径</label>
                <select id="task-path-select">
                    <option value="">请选择任务路径</option>
                </select>
                <div class="error" id="task-path-error">请选择任务路径</div>
            </div>

            <button class="btn" id="submit-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                下发任务
            </button>
            <button class="debug-toggle" id="debug-toggle">查看发送的报文</button>
            <div class="debug-info" id="debug-info"></div>
        </div>

        <!-- 右侧：任务查询 -->
        <div class="card">
            <h2 class="card-title">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M21 21L16.514 16.506" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M11 19C15.4183 19 19 15.4183 19 11C19 6.58172 15.4183 3 11 3C6.58172 3 3 6.58172 3 11C3 15.4183 6.58172 19 11 19Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                任务查询
            </h2>
            
            <div class="query-toggle">
                <div class="toggle-option active" data-type="shelf">按货架查询</div>
                <div class="toggle-option" data-type="order">按OrderId查询</div>
            </div>
            
            <div class="form-group" id="shelf-query-group">

                submitBtn.disabled = false;
            }

        // 加载点位容量
        async function loadPathCapacity(modelProcessCode, capacity) {
            const now = Date.now();
            const last = lastCapacityLoadByCode[modelProcessCode];
            if (last && now - last < 3000) {
                console.log(`容量刷新节流: ${modelProcessCode} 跳过`);
                return;
            }
            lastCapacityLoadByCode[modelProcessCode] = now;

            try {
                const statusList = [4, 6, 9, -1];
                const countMap = new Map();
                
                for (const status of statusList) {
                    const response = await fetch('http://10.68.2.32:8315/crossTask/query', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            modelProcessCode: modelProcessCode,
                            taskStatus: status.toString(),
                            pageSize: 100,
                            pageNo: 1
                        })
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    
                    const data = await response.json();
                    if (data.code === 1000 && data.data.list) {
                        data.data.list.forEach(task => {
                            const path = task.taskPath;
                            if (path) {
                                countMap.set(path, (countMap.get(path) || 0) + 1);
                            }
                        });
                    } else {
                        console.warn('容量查询返回非成功状态:', data);
                    }
                }
                
                Array.from(taskPathSelect.options).forEach(option => {
                    if (option.value && option.dataset.baseText) {
                        const path = option.value;
                        const currentCount = countMap.get(path) || 0;
                        const isFull = currentCount >= capacity;
                        option.textContent = `${option.dataset.baseText} [${currentCount}/${capacity}]`;
                        option.disabled = isFull;
                    }
                });
            } catch (error) {
                console.error('加载点位容量失败:', error);
                showResponse(`容量查询失败: ${error.message}`, true);
            }
        }

        // 检查点位容量是否已满
        async function isPathCapacityFull(modelProcessCode, taskPath, capacity) {
            if (!capacity || capacity <= 0) return false;
            try {
                const statusList = [4, 6, 9, -1];
                let total = 0;
                for (const status of statusList) {
                    const response = await fetch('http://10.68.2.32:8315/crossTask/query', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            modelProcessCode: modelProcessCode,
                            taskStatus: status.toString(),
                            pageSize: 100,
                            pageNo: 1
                        })
                    });
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.json();
                    if (data.code === 1000 && data.data.list) {
                        total += data.data.list.filter(task => task.taskPath === taskPath).length;
                    }
                }
                return total >= capacity;
            } catch (error) {
                console.error('检查点位容量失败:', error);
                showResponse(`容量检查失败: ${error.message}`, true);
                return false;
            }
        }

        // 检查货架任务状态
        async function checkShelfTaskStatus(shelf) {
            const statusList = [4, 6, 9, -1];
            for (const status of statusList) {
                try {
                    const response = await fetch('http://10.68.2.32:8315/crossTask/query', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            taskStatus: status.toString(),
                            shelfNum: shelf,
                            pageSize: 20,
                            pageNo: 1
                        })
                    });
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.json();
                    if (data.code === 1000 && data.data.list && data.data.list.length > 0) {
                        let statusText = '';
                        switch (status) {
                            case 4: statusText = '正在发送'; break;
                            case 6: statusText = '执行中'; break;
                            case 9: statusText = '已下发'; break;
                            case -1: statusText = '容量管控'; break;
                            default: statusText = `状态${status}`;
                        }
                        return { exists: true, status: statusText };
                    }
                } catch (error) {
                    console.error(`查询状态${status}的任务时出错:`, error);
                }
            }
            return { exists: false };
        }

        // 提交任务
        async function submitTask() {
            const area = areaSelect.value;
            const taskName = taskSelect.value;
            if (!area) { alert('请选择区域'); return; }
            if (!taskName) { alert('请选择任务模板'); return; }
            
            const task = config.areas[area].tasks[taskName];
            if (!task) { alert('错误：找不到对应的任务配置'); return; }
            
            let shelf = shelfInput.value.trim();
            if (task.requires_shelf && !shelf) {
                shelfError.style.display = 'block';
                alert('错误：请输入有效的货架号！');
                return;
            }

            if (task.requires_task_path) {
                const taskPathValue = taskPathSelect.value;
                if (!taskPathValue || taskPathValue.trim() === '' || taskPathValue === '请选择任务路径') {
                    taskPathError.style.display = 'block';
                    alert('错误：请选择有效的任务路径！');
                    return;
                }
            }
            
            if (task.requires_shelf && shelfHistory[shelf] && (Date.now() - shelfHistory[shelf]) < 300000) {
                shelfLock.style.display = 'block';
                return;
            }
            
            if (task.requires_shelf) {
                submitBtn.disabled = true;
                submitBtn.textContent = '检查任务状态中...';
                try {
                    const checkResult = await checkShelfTaskStatus(shelf);
                    if (checkResult.exists) {
                        taskExistsMessage.textContent = `当前货架 ${shelf} 有任务正在${checkResult.status}，请勿重复下发！`;
                        taskExistsModal.style.display = 'flex';
                        shelfQueryInput.value = shelf;
                        document.querySelector('.toggle-option[data-type="shelf"]').classList.add('active');
                        document.querySelector('.toggle-option[data-type="order"]').classList.remove('active');
                        shelfQueryGroup.style.display = 'block';
                        orderQueryGroup.style.display = 'none';
                        setTimeout(() => queryTasks(), 100);
                        submitBtn.disabled = false;
                        submitBtn.textContent = '下发任务';
                        return;
                    }
                } catch (error) {
                    console.error('检查货架任务状态时出错:', error);
                    showResponse(`货架状态检查失败: ${error.message}`, true);
                }
                submitBtn.textContent = '下发中...';
            }
            
            if (task.requires_task_path && task.capacity && task.capacity > 0) {
                const selectedPath = taskPathSelect.value;
                const isFull = await isPathCapacityFull(task.code, selectedPath, task.capacity);
                if (isFull) {
                    capacityModalMessage.textContent = `所选点位 ${selectedPath} 当前占用已达上限 (${task.capacity}/${task.capacity})，请等待任务执行完成后再试。`;
                    capacityModal.style.display = 'flex';
                    submitBtn.disabled = false;
                    submitBtn.textContent = '下发任务';
                    return;
                }
            }
            
            const getBeijingTime = () => {
                const now = new Date();
                return now.toLocaleString('sv-SE', { timeZone: 'Asia/Shanghai' }).replace('T', ' ');
            };

            const requestData = [{
                modelProcessCode: task.code,
                priority: 6,
                orderId: `pad_html${getBeijingTime()}`,
                fromSystem: "pad-html",
                taskOrderDetail: {
                    taskPath: task.requires_task_path ? taskPathSelect.value : "",
                    shelfNumber: task.requires_shelf ? shelf : ""
                }
            }];
            
            debugInfo.textContent = JSON.stringify(requestData, null, 2);
            
            try {
                const targetUrl = task.base_url;
                const response = await fetch(targetUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                showResponse(JSON.stringify(data, null, 2));
                
                if (data.code === 1000) {
                    successModal.style.display = 'flex';
                    if (task.requires_shelf && shelf) {
                        shelfHistory[shelf] = Date.now();
                    }
                    const orderId = requestData[0].orderId;
                    orderQueryInput.value = orderId;
                    toggleQueryType({ target: document.querySelector('.toggle-option[data-type="order"]') });
                    queryTasks();
                    
                    if (task.requires_task_path && task.capacity && task.capacity > 0) {
                        setTimeout(() => {
                            loadPathCapacity(task.code, task.capacity);
                        }, 500);
                    }
                } else {
                    showResponse(`下发失败: ${data.desc || '未知错误'}`, true);
                }
            } catch (error) {
                showResponse(`请求失败: ${error.message}`, true);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '下发任务';
            }
        }

        // 切换调试信息
        function toggleDebugInfo() {
            if (debugInfo.style.display === 'block') {
                debugInfo.style.display = 'none';
                debugToggle.textContent = '查看发送的报文';
            } else {
                debugInfo.style.display = 'block';
                debugToggle.textContent = '隐藏发送的报文';
            }
        }
