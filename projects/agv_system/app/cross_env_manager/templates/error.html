<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错误 - {{ status_code }}</title>
    <link href="/static/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/vendor/bootstrap-icons/bootstrap-icons.min.css">
    <style>
        body {
            background: var(--bs-body-bg);
            color: var(--bs-body-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-container {
            text-align: center;
            padding: 2rem;
        }
        .error-code {
            font-size: 6rem;
            font-weight: 800;
            opacity: 0.15;
            line-height: 1;
            margin-bottom: -1.5rem;
        }
        .error-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .error-message {
            font-size: 1.1rem;
            opacity: 0.8;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">{{ status_code }}</div>
        <div class="error-icon">
            {% if status_code == 404 %}
            <i class="bi bi-emoji-frown text-warning"></i>
            {% elif status_code == 403 %}
            <i class="bi bi-shield-exclamation text-danger"></i>
            {% elif status_code == 500 %}
            <i class="bi bi-bug text-danger"></i>
            {% else %}
            <i class="bi bi-exclamation-circle text-warning"></i>
            {% endif %}
        </div>
        <h3 class="mb-2">
            {% if status_code == 404 %}页面未找到
            {% elif status_code == 403 %}权限不足
            {% elif status_code == 500 %}服务器内部错误
            {% else %}发生错误
            {% endif %}
        </h3>
        <p class="error-message">{{ error_message }}</p>
        <a href="/" class="btn btn-primary">
            <i class="bi bi-house-door me-1"></i>返回首页
        </a>
        <button class="btn btn-outline-secondary ms-2" onclick="history.back()">
            <i class="bi bi-arrow-left me-1"></i>返回上一页
        </button>
    </div>
</body>
</html>
