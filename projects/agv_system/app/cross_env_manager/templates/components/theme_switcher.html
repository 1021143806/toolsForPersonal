{# 主题切换组件 #}
<!-- 主题切换按钮 -->
<div class="theme-switcher">
    <button id="themeToggle" class="btn btn-primary theme-btn" title="切换主题">
        <i class="bi bi-moon-stars"></i>
    </button>
</div>

<!-- 浮动操作按钮 -->
<div class="floating-action">
    <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="btn btn-primary floating-btn" title="回到顶部">
        <i class="bi bi-arrow-up"></i>
    </button>
</div>

<style>
    .theme-switcher {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 1000;
    }
    
    .theme-btn {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.25rem;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        transition: all 0.3s;
    }
    
    .theme-btn:hover {
        transform: rotate(15deg) scale(1.1);
    }
    
    .floating-action {
        position: fixed;
        bottom: 80px;
        right: 20px;
        z-index: 1000;
    }
    
    .floating-btn {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.25rem;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        transition: all 0.3s;
    }
    
    .floating-btn:hover {
        transform: translateY(-3px);
    }
</style>
