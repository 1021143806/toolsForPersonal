{# 导航组件 #}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 rounded-3">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}">
            <i class="bi bi-diagram-3 me-2"></i>
            跨环境任务管理系统
        </a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" 
                       href="{{ url_for('index') }}">
                        <i class="bi bi-house me-1"></i> 首页
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'query_home' %}active{% endif %}" 
                       href="{{ url_for('query_home') }}">
                        <i class="bi bi-search me-1"></i> 查询功能
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if 'task_query' in request.endpoint %}active{% endif %}" 
                       href="{{ url_for('task_query_home') }}">
                        <i class="bi bi-search-heart me-1"></i> 任务查询
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'list_join_qr_nodes' %}active{% endif %}" 
                       href="{{ url_for('list_join_qr_nodes') }}">
                        <i class="bi bi-qr-code me-1"></i> QR节点
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'addtask' %}active{% endif %}" 
                       href="{{ url_for('addtask') }}">
                        <i class="bi bi-send me-1"></i> 任务下发
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'show_docs' %}active{% endif %}" 
                       href="{{ url_for('show_docs') }}">
                        <i class="bi bi-journal-text me-1"></i> 文档
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'show_stats' %}active{% endif %}" 
                       href="{{ url_for('show_stats') }}">
                        <i class="bi bi-graph-up me-1"></i> 统计
                    </a>
                </li>
            </ul>
            
            <div class="d-flex">
                <button class="btn btn-outline-light me-2" id="themeToggle" title="切换主题">
                    <i class="bi bi-moon-stars"></i>
                </button>
                
                {% if current_user and current_user.is_authenticated %}
                    <div class="dropdown">
                        <button class="btn btn-outline-light dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle me-1"></i>
                            {{ current_user.username }}
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="#"><i class="bi bi-gear me-2"></i> 设置</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#"><i class="bi bi-box-arrow-right me-2"></i> 退出</a></li>
                        </ul>
                    </div>
                {% else %}
                    <a href="#" class="btn btn-outline-light">
                        <i class="bi bi-box-arrow-in-right me-1"></i> 登录
                    </a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>
