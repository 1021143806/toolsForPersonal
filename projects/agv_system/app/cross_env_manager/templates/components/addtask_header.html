<!-- 页头 (模板风格 + 功能按钮) -->
<div class="header text-center animate__animated animate__fadeInDown">
    <div class="position-relative">
        <h1 class="display-5 fw-bold mb-3"><i class="bi bi-diagram-3 me-2"></i>AGV 跨环境任务下发系统</h1>
        <p class="lead mb-4 opacity-75">智能管理 · 实时监控 · 容量管控</p>
        
        <!-- 用户登录状态显示 -->
        <div class="user-status mb-3">
            {% if logged_in %}
            <div class="d-inline-flex align-items-center bg-success bg-opacity-25 px-3 py-2 rounded-pill">
                <i class="bi bi-person-check-fill me-2"></i>
                <span class="fw-medium">已登录: {{ username }}</span>
                <button id="logout-btn" class="btn btn-sm btn-outline-light ms-3">
                    <i class="bi bi-box-arrow-right me-1"></i>注销
                </button>
            </div>
            {% else %}
            <div class="d-inline-flex align-items-center bg-warning bg-opacity-25 px-3 py-2 rounded-pill">
                <i class="bi bi-person-x-fill me-2"></i>
                <span class="fw-medium">未登录</span>
                <button id="login-btn" class="btn btn-sm btn-outline-light ms-3" data-bs-toggle="modal" data-bs-target="#login-modal">
                    <i class="bi bi-box-arrow-in-right me-1"></i>登录
                </button>
            </div>
            {% endif %}
        </div>
        
        <div class="d-flex flex-wrap justify-content-center gap-3">
            {% if logged_in %}
            <button id="config-toggle" class="btn btn-outline-light btn-lg px-4">
                <i class="bi bi-gear me-2"></i>配置管理
            </button>
            {% endif %}
            <button id="help-toggle" class="btn btn-outline-light btn-lg px-4">
                <i class="bi bi-question-circle me-2"></i>帮助文档
            </button>
        </div>
    </div>
</div>
