<!-- 备份管理 -->
<div class="editor-container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0"><i class="bi bi-clock-history me-2"></i>配置备份管理</h4>
        <div class="btn-group" role="group">
            <button type="button" class="btn btn-outline-secondary active" id="view-list-btn">
                <i class="bi bi-list me-1"></i>列表视图
            </button>
            <button type="button" class="btn btn-outline-secondary" id="view-tree-btn">
                <i class="bi bi-diagram-3 me-1"></i>树状图
            </button>
        </div>
    </div>
    <div class="row">
        <!-- 列表视图 -->
        <div class="col-md-8" id="list-view-container">
            <div class="backup-list" id="backup-list">
                <div class="text-center py-3 text-muted">
                    <i class="bi bi-hourglass-split me-2"></i>加载备份列表...
                </div>
            </div>
        </div>
        <!-- 树状图视图 -->
        <div class="col-md-8" id="tree-view-container" style="display: none;">
            <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h5 class="mb-0"><i class="bi bi-diagram-3 me-2"></i>备份历史树状图</h5>
                    <div class="d-flex gap-2">
                        <button class="btn btn-sm btn-outline-info" id="refresh-tree-btn">
                            <i class="bi bi-arrow-clockwise me-1"></i>刷新
                        </button>
                    </div>
                </div>
                <div id="backup-tree-container" style="height: 300px; border: 1px solid var(--border-color); border-radius: 8px; background-color: var(--card-bg); position: relative;">
                    <div class="text-center py-5 text-muted">
                        <i class="bi bi-hourglass-split me-2"></i>加载备份树状图...
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="form-section">
                <h6>备份操作</h6>
                <button class="btn btn-outline-primary w-100 mb-2" id="create-backup-btn">
                    <i class="bi bi-plus-circle me-2"></i>创建手动备份
                </button>
                <button class="btn btn-outline-info w-100 mb-2" id="export-config-backup-btn">
                    <i class="bi bi-download me-2"></i>导出当前配置
                </button>
                <button class="btn btn-outline-warning w-100" id="import-config-backup-btn">
                    <i class="bi bi-upload me-2"></i>导入配置文件
                </button>
                <input type="file" id="backup-file-input" accept=".js,.json" style="display: none;">
            </div>
        </div>
    </div>
</div>
