{% extends "base.html" %}

{% block title %}跨环境任务模板管理系统 - 文档中心{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
                <div class="d-flex justify-content-between align-items-center">
                    <h4 class="mb-0"><i class="bi bi-journal-text me-2"></i> 文档中心</h4>
                    <a href="{{ url_for('index') }}" class="btn btn-light btn-sm">
                        <i class="bi bi-arrow-left me-1"></i> 返回首页
                    </a>
                </div>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-4">
                        <a href="/docs/module/template" class="text-decoration-none">
                            <div class="card h-100 border-primary">
                                <div class="card-body text-center">
                                    <i class="bi bi-diagram-3 fs-1 text-primary"></i>
                                    <h5 class="mt-2">模板管理</h5>
                                    <p class="small text-muted">搜索、编辑、复制跨环境任务模板</p>
                                </div>
                            </div>
                        </a>
                    </div>
                    <div class="col-md-4">
                        <a href="/docs/module/addTask" class="text-decoration-none">
                            <div class="card h-100 border-success">
                                <div class="card-body text-center">
                                    <i class="bi bi-send fs-1 text-success"></i>
                                    <h5 class="mt-2">任务下发</h5>
                                    <p class="small text-muted">AGV跨环境任务下发系统</p>
                                </div>
                            </div>
                        </a>
                    </div>
                    <div class="col-md-4">
                        <a href="/docs/module/query" class="text-decoration-none">
                            <div class="card h-100 border-info">
                                <div class="card-body text-center">
                                    <i class="bi bi-search fs-1 text-info"></i>
                                    <h5 class="mt-2">查询功能</h5>
                                    <p class="small text-muted">任务查询、货架查询、状态概览</p>
                                </div>
                            </div>
                        </a>
                    </div>
                    <div class="col-md-4">
                        <a href="/docs/module/stats" class="text-decoration-none">
                            <div class="card h-100 border-warning">
                                <div class="card-body text-center">
                                    <i class="bi bi-graph-up fs-1 text-warning"></i>
                                    <h5 class="mt-2">统计仪表盘</h5>
                                    <p class="small text-muted">数据分析与可视化图表</p>
                                </div>
                            </div>
                        </a>
                    </div>
                    <div class="col-md-4">
                        <a href="/docs/module/components" class="text-decoration-none">
                            <div class="card h-100 border-secondary">
                                <div class="card-body text-center">
                                    <i class="bi bi-puzzle fs-1 text-secondary"></i>
                                    <h5 class="mt-2">共享组件</h5>
                                    <p class="small text-muted">UI组件库与使用说明</p>
                                </div>
                            </div>
                        </a>
                    </div>
                    <div class="col-md-4">
                        <a href="/docs/module/api" class="text-decoration-none">
                            <div class="card h-100 border-danger">
                                <div class="card-body text-center">
                                    <i class="bi bi-code-slash fs-1 text-danger"></i>
                                    <h5 class="mt-2">API 文档</h5>
                                    <p class="small text-muted">后端接口完整参考</p>
                                </div>
                            </div>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
