<!DOCTYPE html>
<html>
<head>
    <title>测试JavaScript confirm()</title>
</head>
<body>
    <h1>测试confirm()对话框</h1>
    
    <button onclick="testConfirm()">测试confirm()</button>
    
    <script>
        function testConfirm() {
            console.log("testConfirm函数被调用");
            if (confirm("这是一个测试对话框，你看到了吗？")) {
                alert("你点击了确定");
            } else {
                alert("你点击了取消");
            }
        }
    </script>
    
    <p>打开浏览器控制台查看日志</p>
</body>
</html>
